  <!-- PWA install logic -->
  <script>
    // ── SERVICE WORKER ──────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('[SW] Registered:', reg.scope))
          .catch(err => console.warn('[SW] Registration failed:', err));
      });
    }

    // ── INSTALL BANNER LOGIC ────────────────────────────────────────────────
    let deferredPrompt = null;
    const banner = document.getElementById('install-banner');
    const btnInstall = document.getElementById('btn-install');
    const btnDismiss = document.getElementById('btn-dismiss');

    // Show banner every time the app loads — as requested
    // (we still capture the prompt for native install flow)
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      // Show after a short delay so the app has rendered
      setTimeout(() => banner.classList.add('visible'), 1800);
    });

    // If already installed (standalone mode), never show the banner
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches
                      || window.navigator.standalone === true;

    if (!isStandalone) {
      // Show install banner on every load as requested
      // Even if beforeinstallprompt hasn't fired yet (iOS, some browsers)
      setTimeout(() => banner.classList.add('visible'), 2000);
    }

    btnInstall.addEventListener('click', async () => {
      if (deferredPrompt) {
        // Native Chrome install dialog
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log('[PWA] Install outcome:', outcome);
        deferredPrompt = null;
      } else {
        // Fallback: show browser-specific instructions
        const ua = navigator.userAgent.toLowerCase();
        if (/iphone|ipad/.test(ua)) {
          alert('To install on iOS:\n\n1. Tap the Share button (□↑) at the bottom of Safari\n2. Scroll down and tap "Add to Home Screen"\n3. Tap "Add" — done!');
        } else if (/android/.test(ua)) {
          alert('To install on Android:\n\n1. Tap the ⋮ menu in Chrome\n2. Tap "Add to Home screen" or "Install app"\n3. Tap "Add" — done!');
        } else {
          alert('To install:\n\nIn Chrome, click the install icon (⊕) in the address bar, or go to ⋮ menu → "Install Kansas Vanity Plate Generator"');
        }
      }
      banner.classList.remove('visible');
    });

    btnDismiss.addEventListener('click', () => {
      banner.classList.remove('visible');
    });

    // If app gets installed, hide the banner
    window.addEventListener('appinstalled', () => {
      banner.classList.remove('visible');
      console.log('[PWA] App installed!');
    });

    // ── LOADING SCREEN REMOVAL ──────────────────────────────────────────────
    // Remove loading screen once React has had time to render
    window.addEventListener('load', () => {
      setTimeout(() => {
        const ls = document.getElementById('loading-screen');
        if (ls) {
          ls.classList.add('fade-out');
          setTimeout(() => ls.remove(), 500);
        }
      }, 400);
    });
  </script>

const LEET = { A:"4",E:"3",I:"1",O:"0",S:"5",T:"7",G:"9",B:"8",L:"1" };
function toPlate(word) {
  let p = word.toUpperCase().replace(/\s+/g,"_");
  p = p.split("").map((c,i) => i===0 ? c : (LEET[c]||c)).join("");
  if (p.length > 7) p = p.substring(0,7);
  if (p.replace(/_/g,"").length < 3) p = p + "_K5";
  return p.substring(0,7);
}
function calcProb(plate, word) {
  let score = 92;
  const all = (plate + " " + word).toUpperCase();
  const flags = [
    [/COKE|CRACK|METH|HEROIN/,62],[/MURDER/,32],[/TERROR/,66],[/KIDNAP/,72],
    [/HITMAN|ASSASSIN/,56],[/CARTEL|MAFIA/,46],[/BLUNT|BONG|REEFER/,28],
    [/MOLLY|MDMA|ECSTASY/,40],[/WEED|KUSH|SATIVA|INDICA/,22],[/ACID|LSD|DMT/,45],
    [/RIOT/,22],[/SATAN|LUCIFER/,32],[/SACRILEGE/,24],[/BLACKED/,44],
    [/SINISTER/,20],[/TYRANT|DICTATOR/,32],[/DEPRAVED/,36],[/PLAGUE|HAVOC/,16],
    [/WRATH|RAGE/,12],[/EXORCIST/,16],[/FELON|CONVICT/,32],[/OUTLAW/,20],
    [/ANARCHY/,26],[/CARNAGE/,22],[/HALLUCIN|PSYCHO/,22],[/HERETIC/,22],
    [/HEIST/,26],[/APOCALYPSE/,16],[/DAMNATION|PERDITION/,20],[/VOID|ABYSS/,8],
  ];
  flags.forEach(([r,pen]) => { if (r.test(all)) score -= pen; });
  const leet = (plate.replace(/_/g,"").match(/[0-9]/g)||[]).length;
  if (leet >= 3) score = Math.min(score+8, 95);
  else if (leet >= 2) score = Math.min(score+5, 95);
  return Math.max(5, Math.min(95, Math.round(score)));
}
function getProbStyle(p) {
  if (p >= 75) return { color:"#00ff88", label:"CLEARED", bars:5 };
  if (p >= 50) return { color:"#ff7700", label:"RISKY",   bars:3 };
  if (p >= 30) return { color:"#ff1155", label:"FLAGGED", bars:2 };
  return               { color:"#ff00dd", label:"DENIED",  bars:1 };
}

const ForgeTab = ({usedPlates, onMarkUsed, onUnmarkUsed}) => {
  const allSectionKeys = Object.keys(BANKS);
  const [forgeResults, setForgeResults]     = useState([]);
  const [count, setCount]                   = useState(20);
  const [running, setRunning]               = useState(false);
  const [activeSections, setActiveSections] = useState(allSectionKeys);

  const toggleForgeSection = (sec) => {
    setActiveSections(prev => {
      if (prev.includes(sec)) {
        if (prev.length === 1) return prev;
        return prev.filter(s => s !== sec);
      }
      return [...prev, sec];
    });
  };

  // Forge a single hybrid plate from two words across two sections
  const forgePlate = (wordA, wordB, secA, secB) => {
    const a = wordA.toUpperCase().replace(/\s+/g,"");
    const b = wordB.toUpperCase().replace(/\s+/g,"");
    // Try different combo strategies and pick one randomly
    const strategies = [
      // First 3-4 chars of A + first 3-4 chars of B
      () => (a.slice(0,3) + b.slice(0,4)).slice(0,7),
      () => (a.slice(0,4) + b.slice(0,3)).slice(0,7),
      // First 2 of A + first 5 of B
      () => (a.slice(0,2) + b.slice(0,5)).slice(0,7),
      // Last 3 of A + first 4 of B
      () => (a.slice(-3) + b.slice(0,4)).slice(0,7),
      // First 4 of A + last 3 of B
      () => (a.slice(0,4) + b.slice(-3)).slice(0,7),
      // Full A truncated to 7 (single word mode if sections overlap)
      () => a.slice(0,7),
      // Leet-splice: first half of A leet'd + second half of B
      () => {
        const half = Math.min(3, Math.floor(a.length/2));
        const partA = a.slice(0,half).split("").map((c,i)=>i>0?(LEET[c]||c):c).join("");
        return (partA + b.slice(0,7-partA.length)).slice(0,7);
      },
    ];
    const strategy = strategies[Math.floor(Math.random() * strategies.length)];
    let plate = strategy();
    // Clean: only A-Z0-9_
    plate = plate.replace(/[^A-Z0-9_]/g,"");
    if (plate.length < 2) plate = (a+b).slice(0,7);
    return plate.slice(0,7);
  };

  const runForge = useCallback(() => {
    setRunning(true);
    const results = [];
    const usedPlateSet = new Set();

    if (activeSections.length === 1) {
      // Single section — just random plates from that section
      const sec = activeSections[0];
      const bank = BANKS[sec];
      const pool = [...bank.words].sort(() => Math.random() - 0.5);
      for (const word of pool) {
        if (results.length >= count) break;
        const plate = toPlate(word);
        if (usedPlateSet.has(plate)) continue;
        usedPlateSet.add(plate);
        results.push({
          id: `forge-${plate}-${Math.random()}`,
          plate, meaning: word,
          section: sec, sections: [sec],
          combo: false, prob: calcProb(plate, word),
        });
      }
    } else {
      // Multi-section — randomly pick two sections and mash a word from each
      let attempts = 0;
      while (results.length < count && attempts < count * 10) {
        attempts++;
        // Pick two different random sections
        const shuffled = [...activeSections].sort(() => Math.random() - 0.5);
        const secA = shuffled[0];
        const secB = shuffled[1];
        const bankA = BANKS[secA];
        const bankB = BANKS[secB];
        const wordA = bankA.words[Math.floor(Math.random() * bankA.words.length)];
        const wordB = bankB.words[Math.floor(Math.random() * bankB.words.length)];
        const plate = forgePlate(wordA, wordB, secA, secB);
        if (usedPlateSet.has(plate) || plate.length < 3) continue;
        usedPlateSet.add(plate);
        const meaning = `${wordA} × ${wordB}`;
        results.push({
          id: `forge-${plate}-${Math.random()}`,
          plate, meaning,
          section: secA, sections: [secA, secB],
          comboSections: [secA, secB],
          combo: true,
          prob: calcProb(plate, wordA + " " + wordB),
        });
      }
    }

    setForgeResults(results.sort((a, b) => b.prob - a.prob));
    setTimeout(() => setRunning(false), 200);
  }, [count, activeSections]);

  useEffect(() => { runForge(); }, []);

  const totalUsed = forgeResults.filter(r => usedPlates.has(r.plate)).length;
  const isComboMode = activeSections.length > 1;

  return (
    <div className="fade-up" style={{maxWidth:780, margin:"0 auto", padding:"16px 14px"}}>

      {/* ── SECTION SELECTOR ── */}
      <div style={{
        background:"rgba(10,10,28,0.95)",
        border:"1px solid rgba(255,232,31,0.2)",
        borderRadius:4, padding:"14px", marginBottom:12
      }}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8, flexWrap:"wrap", gap:6}}>
          <div style={{fontFamily:"'Courier New',monospace", fontSize:10, color:"#ffe81f", letterSpacing:3, fontWeight:"bold"}}>
            ▸ SELECT SECTIONS TO FORGE
          </div>
          {isComboMode && (
            <div style={{
              fontFamily:"'Courier New',monospace", fontSize:9, color:"#ffe81f",
              background:"rgba(255,232,31,0.1)", border:"1px solid rgba(255,232,31,0.3)",
              borderRadius:2, padding:"3px 10px", letterSpacing:1
            }}>
              ⚡ COMBO MODE — {activeSections.length} SECTIONS MIXING
            </div>
          )}
        </div>
        <div style={{
          fontFamily:"'Courier New',monospace", fontSize:8, color:"#505070",
          letterSpacing:1, marginBottom:10, lineHeight:1.6
        }}>
          {isComboMode
            ? `FORGE RANDOMLY MIXES WORDS FROM YOUR ${activeSections.length} SELECTED SECTIONS INTO HYBRID PLATES`
            : "SELECT 2+ SECTIONS TO ENABLE COMBO MIXING — OR KEEP ONE FOR PURE SECTION PLATES"
          }
        </div>
        <div style={{display:"flex", flexWrap:"wrap", gap:5, marginBottom:10}}>
          <button
            onClick={() => setActiveSections(
              activeSections.length === allSectionKeys.length ? [allSectionKeys[0]] : allSectionKeys
            )}
            style={{
              background:"rgba(255,232,31,0.1)", border:"1px solid rgba(255,232,31,0.3)",
              color:"#ffe81f", fontFamily:"'Courier New',monospace", fontSize:8,
              fontWeight:"bold", padding:"4px 9px", borderRadius:2, letterSpacing:1, cursor:"pointer"
            }}>
            {activeSections.length === allSectionKeys.length ? "CLEAR ALL" : "ALL"}
          </button>
          {allSectionKeys.map(sk => {
            const active = activeSections.includes(sk);
            const col = BANKS[sk]?.color || "#00f5ff";
            return (
              <button key={sk} onClick={() => toggleForgeSection(sk)}
                style={{
                  background: active ? `${col}22` : "rgba(10,10,28,0.9)",

const PlateSlideshow = ({ items, styleKey, emptyMsg }) => {
  const [idx, setIdx] = useState(0);

    <div style={{textAlign:"center",padding:"28px 0",color:"#303055",fontFamily:"'Courier New',monospace",fontSize:11,letterSpacing:2}}>{emptyMsg}</div>

  const prev = () => setIdx(i => (i - 1 + total) % total);

  );

// ─── MAIN APP ──────────────────────────────────────────────────────────────────
export default function App() {
  const [tab, setTab]                   = useState("GENERATE");
  const [selectedSections, setSelectedSections] = useState(() => {
    try {
      const s = localStorage.getItem('ksvp_sections');
      return s ? JSON.parse(s) : ['ANIME'];
    } catch(e) { return ['ANIME']; }
  });
  const [generated, setGenerated]       = useState([]);
  const [saved, setSaved] = useState(() => {
    try {
      const s = localStorage.getItem('ksvp_saved');
      return s ? JSON.parse(s) : [];
    } catch(e) { return []; }
  });
  const [count, setCount]               = useState(5);
  const [search, setSearch]             = useState("");
  const [sortBy, setSortBy]             = useState("newest");
  const [booted, setBooted]             = useState(false);
  const [bootIdx, setBootIdx]           = useState(0);
  const [usedPlates, setUsedPlates] = useState(() => {
    try {
      const s = localStorage.getItem('ksvp_used');
      return s ? new Set(JSON.parse(s)) : new Set();
    } catch(e) { return new Set(); }
  });

  const totalWords = Object.values(BANKS).reduce((a,b) => a + b.words.length, 0);
  const bootLines = [
    "▸ SYS:INIT // PLATE_GENERATOR v8.0",
    `▸ WORD BANKS LOADED // ${totalWords} WORDS // ${Object.keys(BANKS).length} SECTIONS`,
    `▸ ANGELIC PROPHECY LOADED // ${BANKS["ANGELIC PROPHECY"].words.length} DIVINE WORDS`,
    `▸ STAR WARS LOADED // ${BANKS["STAR WARS"].words.length} GALAXY WORDS`,
    `▸ PLATE STYLE ARCHIVE // ${Object.keys(PLATE_STYLES).length} KS DESIGNS`,
    "▸ FORGE ENGINE ARMED // USED-PLATE TRACKER ONLINE",
    "▸ ACCESS GRANTED ◂",
  ];

  useEffect(() => {
    if (bootIdx < bootLines.length) {
      const t = setTimeout(() => setBootIdx(i => i+1), 240);
      return () => clearTimeout(t);
    } else {
      const t = setTimeout(() => setBooted(true), 300);
      return () => clearTimeout(t);
    }
  }, [bootIdx]);

  const toggleSection = (sec) => {
    setSelectedSections(prev => {
      if (prev.includes(sec)) { if (prev.length === 1) return prev; return prev.filter(s => s !== sec); }
      return [...prev, sec];
    });
  };

  const generate = useCallback(() => {
    if (!selectedSections.length) return;
    const wordMap = new Map();
    for (const sec of selectedSections) {
      const bank = BANKS[sec]; if (!bank) continue;
      for (const word of bank.words) {
        if (!wordMap.has(word)) wordMap.set(word, new Set());
        wordMap.get(word).add(sec);
      }
    }
    const pool = Array.from(wordMap.entries()).map(([word,secSet]) => ({word, sections:Array.from(secSet)}));
    const usedPl = new Set();
    const batch = [];
    const max = Math.min(count, pool.length);
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    for (const {word,sections} of shuffled) {
      if (batch.length >= max) break;
      const plate = toPlate(word);
      if (usedPl.has(plate)) continue;
      usedPl.add(plate);
      const prob = calcProb(plate, word);
      batch.push({plate, meaning:word, sections, section:sections[0], prob, id:String(Date.now())+String(Math.random())});
    }
    setGenerated(batch);
  }, [selectedSections, count]);

  useEffect(() => { if (booted) generate(); }, [booted]);

  // ── LOCALSTORAGE PERSISTENCE ──
  useEffect(() => {
    try { localStorage.setItem('ksvp_saved', JSON.stringify(saved)); }
    catch(e) {}
  }, [saved]);

  useEffect(() => {
    try { localStorage.setItem('ksvp_used', JSON.stringify(Array.from(usedPlates))); }
    catch(e) {}
  }, [usedPlates]);

  useEffect(() => {
    try { localStorage.setItem('ksvp_sections', JSON.stringify(selectedSections)); }
    catch(e) {}
  }, [selectedSections]);

  const handleSave   = (item) => { setSaved(s => s.find(x=>x.plate===item.plate)?s:[{...item,savedAt:Date.now()},...s]); setGenerated(g => g.filter(x=>x.id!==item.id)); };
  const handleReject = (item) => setGenerated(g => g.filter(x=>x.id!==item.id));
  const handleRemove = (item) => setSaved(s => s.filter(x=>x.plate!==item.plate));

  const handleMarkUsed = (plate) => setUsedPlates(prev => { const n = new Set(prev); n.add(plate); return n; });
  const handleUnmarkUsed = (plate) => {
    if (plate === "ALL") { setUsedPlates(new Set()); return; }
    setUsedPlates(prev => { const n = new Set(prev); n.delete(plate); return n; });
  };

  const filteredSaved = saved
    .filter(p => !search || (p.plate+p.meaning+(p.sections||[p.section]).join(" ")).toLowerCase().includes(search.toLowerCase()))
    .sort((a,b) => {
      if (sortBy==="prob-desc") return b.prob - a.prob;
      if (sortBy==="prob-asc")  return a.prob - b.prob;
      if (sortBy==="alpha")     return a.plate.localeCompare(b.plate);
      return b.savedAt - a.savedAt;
    });

  const multiActive = selectedSections.length > 1;
  const combinedPoolSize = (() => {
    const w = new Set();
    for (const sec of selectedSections) (BANKS[sec]?.words||[]).forEach(x => w.add(x));
    return w.size;
  })();

  if (!booted) return (
    <div style={{minHeight:"100vh",background:"#050510",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:10,padding:20}}>
      <style>{CSS}</style>
      {bootLines.slice(0, bootIdx).map((l,i) => (
        <div key={i} style={{fontFamily:"'Courier New',monospace",
          color: i===bootLines.length-1 ? "#00ff88" : i>=2&&i<=3 ? "#e8d5ff" : "#00f5ff",
          fontSize:12, letterSpacing:2,
          textShadow: i===bootLines.length-1 ? "0 0 10px #00ff88" : i>=2&&i<=3 ? "0 0 10px #e8d5ff" : "0 0 10px #00f5ff"}}>{l}</div>
      ))}
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#050510",
      backgroundImage:"radial-gradient(ellipse at 15% 15%,rgba(0,245,255,0.05) 0%,transparent 45%),radial-gradient(ellipse at 85% 85%,rgba(255,0,221,0.04) 0%,transparent 45%),radial-gradient(ellipse at 50% 80%,rgba(232,213,255,0.02) 0%,transparent 40%),repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(0,245,255,0.01) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(0,245,255,0.01) 40px)",
      fontFamily:"'Courier New',monospace",color:"#e0e0ff"}}>
      <style>{CSS}</style>

      <GradBar/>
      <div style={{textAlign:"center",padding:"16px 16px 0",background:"linear-gradient(180deg,rgba(0,245,255,0.04) 0%,transparent 100%)"}}>
        <div style={{fontSize:10,color:"#007a88",letterSpacing:4,marginBottom:10}}>
          ▸ PLATE_GENERATOR v8.0 // {totalWords} WORDS // {Object.keys(BANKS).length} SECTIONS // {Object.keys(PLATE_STYLES).length} STYLES ◂
        </div>
        <div style={{fontSize:38,fontWeight:"bold",color:"#00f5ff",letterSpacing:6,animation:"glow 3s infinite"}}>KANSAS</div>
      </div>
      <DrivingCar/>
      <div style={{textAlign:"center",padding:"0 16px 12px"}}>
        <div style={{fontSize:38,fontWeight:"bold",color:"#ff00dd",letterSpacing:6,animation:"glowM 3s infinite"}}>VANITY</div>
        <div style={{fontSize:10,color:"#505070",marginTop:6,letterSpacing:3}}>
          PLATE GENERATOR // {Object.keys(BANKS).length} SECTIONS // {totalWords} WORDS // FORGE ENGINE // USED TRACKER
        </div>
        <div className="plate-glitch" style={{marginTop:14,display:"flex",justifyContent:"center"}}>
          <div style={{width:300,maxWidth:"88vw",boxShadow:"0 0 40px rgba(122,85,0,0.4)"}}><KSPlate styleKey="BLACKED" text="V0ID_KS" uid="hero-main"/></div>
        </div>
      </div>
      <GradBar/>

      {/* TABS */}
      <div style={{display:"flex",borderBottom:"1px solid rgba(0,245,255,0.1)",background:"rgba(5,5,16,0.98)",position:"sticky",top:0,zIndex:100,overflowX:"auto",isolation:"isolate"}}>
        {[
          ["GENERATE","⟳"],
          ["FORGE","⚒"],
          ["PLATES","◧"],
          ["SAVED",`◆${saved.length}`],
          ["BROWSE","≡"]
        ].map(([t,icon]) => (
          <button key={t} onClick={()=>setTab(t)}
            style={{flex:1,padding:"12px 4px",background:"none",border:"none",minWidth:68,
              borderBottom:tab===t?"2px solid #00f5ff":"2px solid transparent",
              color:tab===t?"#00f5ff":"#404060",
              fontFamily:"'Courier New',monospace",fontSize:10,fontWeight:"bold",
              letterSpacing:1,transition:"all 0.2s",whiteSpace:"nowrap",
              textShadow:tab===t?"0 0 10px #00f5ff":"none"}}>
            {icon} {t}
          </button>
        ))}
      </div>

      {/* ── TAB CONTENT (isolated stacking context — prevents filter bleed into sticky nav) ── */}
      <div style={{isolation:"isolate", position:"relative"}}>

      {/* ── GENERATE TAB ── */}
      {tab==="GENERATE" && (
        <div className="fade-up" style={{maxWidth:700,margin:"0 auto",padding:"16px 14px"}}>
          <div style={{background:"rgba(10,10,28,0.92)",border:"1px solid rgba(0,245,255,0.14)",borderRadius:4,padding:"14px",marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontSize:10,color:"#007a88",letterSpacing:3}}>
                ▸ SELECT SECTIONS <span style={{color:"#505070"}}>(MULTI-SELECT)</span>
              </div>
              {selectedSections.length>1&&(
                <div style={{fontSize:9,letterSpacing:1,padding:"2px 8px",borderRadius:2,
                  background:"linear-gradient(90deg,rgba(0,245,255,0.15),rgba(255,0,221,0.1))",
                  border:"1px solid rgba(0,245,255,0.3)",color:"#00f5ff"}}>
                  {selectedSections.length} COMBINED · {combinedPoolSize} WORDS
                </div>
              )}
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
              {Object.entries(BANKS).map(([s,b]) => {
                const active = selectedSections.includes(s);
                return (
                  <button key={s} onClick={()=>toggleSection(s)}
                    style={{background:active?`${b.color}22`:"rgba(10,10,28,0.9)",
                      border:`1px solid ${active?b.color:"rgba(26,26,74,0.8)"}`,
                      color:active?b.color:"#404060",
                      fontFamily:"'Courier New',monospace",fontSize:9,fontWeight:"bold",
                      padding:"5px 9px",borderRadius:2,letterSpacing:1,transition:"all 0.15s",
                      textShadow:active?`0 0 8px ${b.color}`:"none",
                      boxShadow:active?`0 0 8px ${b.color}33`:"none",position:"relative"}}>
                    {active&&<span style={{position:"absolute",top:-4,right:-4,width:8,height:8,borderRadius:"50%",background:b.color,boxShadow:`0 0 6px ${b.color}`}}/>}
                    {s} <span style={{opacity:0.45,fontSize:8}}>({b.words.length})</span>
                  </button>
                );
              })}
            </div>
            {selectedSections.length>1&&(
              <div style={{marginBottom:12,padding:"8px 10px",borderRadius:3,background:"rgba(0,0,0,0.3)",border:"1px solid rgba(255,255,255,0.05)"}}>
                <div style={{fontSize:9,color:"#505070",letterSpacing:2,marginBottom:6}}>ACTIVE MIX</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {selectedSections.map(sec=>(
                    <span key={sec} style={{fontFamily:"'Courier New',monospace",fontSize:9,color:BANKS[sec].color,
                      background:`${BANKS[sec].color}18`,border:`1px solid ${BANKS[sec].color}55`,
                      borderRadius:2,padding:"2px 7px",letterSpacing:1}}>{BANKS[sec].tag}</span>
                  ))}
                </div>
              </div>
            )}
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <div style={{fontSize:10,color:"#505070",letterSpacing:2}}>COUNT</div>
              {[3,5,8,12].map(n=>(
                <button key={n} onClick={()=>setCount(n)}
                  style={{background:count===n?"rgba(0,245,255,0.15)":"rgba(10,10,28,0.9)",
                    border:`1px solid ${count===n?"#00f5ff88":"rgba(26,26,74,0.8)"}`,
                    color:count===n?"#00f5ff":"#404060",
                    fontFamily:"'Courier New',monospace",fontSize:12,fontWeight:"bold",
                    padding:"5px 11px",borderRadius:2,transition:"all 0.15s"}}>{n}</button>
              ))}
              <button onClick={generate}
                style={{marginLeft:"auto",
                  background:multiActive?"linear-gradient(135deg,rgba(0,245,255,0.2),rgba(255,0,221,0.2))":"linear-gradient(135deg,rgba(0,245,255,0.15),rgba(255,0,221,0.1))",
                  border:`1px solid ${multiActive?"#00f5ffcc":"#00f5ff88"}`,color:"#00f5ff",
                  fontFamily:"'Courier New',monospace",fontSize:12,fontWeight:"bold",
                  padding:"8px 20px",borderRadius:2,letterSpacing:2,textShadow:"0 0 10px #00f5ff",
                  boxShadow:multiActive?"0 0 16px rgba(0,245,255,0.2)":"none"}}>
                {multiActive?"⟳ GENERATE MIX":"⟳ GENERATE"}
              </button>
            </div>
          </div>

          {generated.length===0 ? (
            <div style={{textAlign:"center",padding:40,color:"#303055",fontSize:12,letterSpacing:2}}>
              SELECT SECTIONS AND HIT GENERATE
            </div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {generated.map(item=><PlateCard key={item.id} item={item} onSave={handleSave} onReject={handleReject}/>)}
              <button onClick={generate}
                style={{background:"rgba(0,245,255,0.05)",border:"1px solid #00f5ff33",color:"#00f5ff",
                  fontFamily:"'Courier New',monospace",fontSize:11,fontWeight:"bold",
                  padding:"10px",borderRadius:2,letterSpacing:2,marginTop:4}}>⟳ REGENERATE ALL</button>
              <button onClick={()=>setTab("PLATES")}
                style={{background:"rgba(255,0,221,0.05)",border:"1px solid #ff00dd33",color:"#ff00dd",
                  fontFamily:"'Courier New',monospace",fontSize:11,fontWeight:"bold",
                  padding:"10px",borderRadius:2,letterSpacing:2}}>◧ PREVIEW ON PLATE STYLES →</button>
              <button onClick={()=>setTab("FORGE")}
                style={{background:"rgba(255,232,31,0.05)",border:"1px solid rgba(255,232,31,0.2)",color:"#ffe81f",
                  fontFamily:"'Courier New',monospace",fontSize:11,fontWeight:"bold",
                  padding:"10px",borderRadius:2,letterSpacing:2}}>⚒ OPEN FORGE ENGINE →</button>
            </div>
          )}
        </div>
      )}

      {/* ── FORGE TAB ── */}
      {tab==="FORGE" && (
        <ForgeTab usedPlates={usedPlates} onMarkUsed={handleMarkUsed} onUnmarkUsed={handleUnmarkUsed}/>
      )}

      {/* ── PLATES TAB ── */}
      {tab==="PLATES" && <PlatesTab generated={[...generated,...saved]}/>}

      {/* ── SAVED TAB ── */}
      {tab==="SAVED" && (
        <div className="fade-up" style={{maxWidth:700,margin:"0 auto",padding:"16px 14px"}}>
          {saved.length===0 ? (
            <div style={{textAlign:"center",padding:60,color:"#303055",fontSize:12,letterSpacing:2}}>
              NO PLATES SAVED YET
              <span style={{fontSize:10,display:"block",marginTop:8}}>HIT ◆ KEEP ON THE GENERATOR TAB</span>
            </div>
          ) : (
            <>
              <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="SEARCH SAVED..."
                  style={{flex:1,minWidth:140,background:"rgba(0,245,255,0.04)",border:"1px solid rgba(0,245,255,0.2)",
                    borderRadius:3,color:"#00f5ff",fontFamily:"'Courier New',monospace",fontSize:11,padding:"7px 10px",letterSpacing:1}}/>
                <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
                  style={{background:"rgba(10,10,28,0.9)",border:"1px solid rgba(255,0,221,0.2)",color:"#ff00dd",
                    fontFamily:"'Courier New',monospace",fontSize:10,padding:"7px 8px"}}>
                  <option value="newest">NEWEST</option>
                  <option value="prob-desc">PROB ↓</option>
                  <option value="prob-asc">PROB ↑</option>
                  <option value="alpha">A → Z</option>
                </select>
              </div>
              <div style={{display:"flex",gap:12,padding:"8px 12px",background:"rgba(10,10,28,0.8)",
                border:"1px solid rgba(26,26,74,0.6)",borderRadius:3,marginBottom:12,flexWrap:"wrap"}}>
                <span style={{fontSize:10,color:"#505070",letterSpacing:2}}>▸ {saved.length} SAVED</span>
                {[["CLEARED",75,100,"#00ff88"],["RISKY",50,74,"#ff7700"],["FLAGGED",30,49,"#ff1155"],["DENIED",0,29,"#ff00dd"]].map(([label,min,max,color])=>{
                  const c=saved.filter(p=>p.prob>=min&&p.prob<=max).length;
                  return c>0?<span key={label} style={{fontFamily:"'Courier New',monospace",fontSize:10}}>
                    <span style={{color,textShadow:`0 0 6px ${color}`}}>{c}</span>
                    <span style={{color:"#404060",marginLeft:4}}>{label}</span>
                  </span>:null;
                })}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {filteredSaved.map(item=><PlateCard key={item.plate} item={item} onRemove={handleRemove}/>)}
              </div>
            </>
          )}
        </div>
      )}

      {/* ── BROWSE TAB ── */}
      {tab==="BROWSE" && (
        <div className="fade-up" style={{maxWidth:780,margin:"0 auto",padding:"16px 14px"}}>
          <div style={{fontSize:10,color:"#505070",letterSpacing:2,marginBottom:16,textAlign:"center"}}>
            HOVER ANY PILL TO SEE PLATE + PROBABILITY // {totalWords} TOTAL WORDS
          </div>
          {Object.entries(BANKS).map(([sec,bank])=>(
            <div key={sec} style={{marginBottom:22}}>
              <div style={{height:2,background:`linear-gradient(90deg,${bank.color},transparent)`}}/>
              <div style={{background:"rgba(10,10,28,0.95)",padding:"8px 14px 4px",borderLeft:`4px solid ${bank.color}`,marginBottom:8}}>
                <div style={{fontSize:13,fontWeight:"bold",color:"#e0e0ff",letterSpacing:3}}>
                  <span style={{color:bank.color,marginRight:8}}>▌</span>{sec}
                </div>
                <div style={{fontSize:9,color:bank.color,opacity:0.6,marginTop:1,letterSpacing:1}}>
                  {bank.tag} // {bank.words.length} WORDS
                </div>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,paddingLeft:4}}>
                {bank.words.map(w=>{
                  const plate=toPlate(w);const prob=calcProb(plate,w);const ps=getProbStyle(prob);
                  return (
                    <div key={w} title={`${plate} — ${prob}% ${ps.label}`}
                      style={{background:"rgba(10,10,28,0.8)",border:`1px solid ${bank.color}22`,borderRadius:2,padding:"3px 7px"}}>
                      <span style={{fontFamily:"'Courier New',monospace",fontSize:9,color:bank.color,letterSpacing:1}}>{plate}</span>
                      <span style={{fontFamily:"'Courier New',monospace",fontSize:8,color:ps.color,marginLeft:4}}>{prob}%</span>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      )} {/* end BROWSE tab */}

      </div> {/* end isolation wrapper */}

      <div style={{marginTop:40}}>
        <GradBar/>
        <div style={{textAlign:"center",padding:"12px 20px"}}>
          <div style={{fontSize:11,color:"#e0e0ff"}}>
            <span style={{color:"#00f5ff"}}>◈</span> END OF FILE <span style={{color:"#ff00dd"}}>◈</span>
          </div>
          <div style={{fontSize:9,color:"#303055",marginTop:4,letterSpacing:1}}>
            Probability = KS DMV rules + content risk scoring. Final approval at DMV discretion.
          </div>
        </div>
        <GradBar/>
      </div>
    </div>
  );
}


    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>

</body>
</html>
